<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow"><title>修改密码 · Content Publisher</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/assets/logo.svg}">
    <link rel="stylesheet" th:href="@{/assets/app.css}"></head>
<body class="auth-page"><main class="password-shell">
    <section class="password-card"><img class="brand-mark" th:src="@{/assets/logo.svg}" alt="Content Publisher"><p class="eyebrow dark">账号安全</p>
        <h1 th:text="${forced} ? '首次登录，请修改初始密码' : '修改登录密码'">修改密码</h1>
        <p class="form-intro" th:if="${forced}">在完成密码修改前，项目、AI 配置和 API 均不可访问。</p>
        <p class="form-intro" th:unless="${forced}">修改成功后，当前会话将被注销，需要使用新密码重新登录。</p>
        <div class="alert error" th:if="${error}" th:text="${error}"></div>
        <form class="login-form" th:action="@{/change-password}" th:object="${changePasswordForm}" method="post">
            <label for="currentPassword">当前密码</label><input id="currentPassword" th:field="*{currentPassword}"
                type="password" maxlength="200" autocomplete="current-password" required>
            <small class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></small>
            <label for="newPassword">新密码</label><input id="newPassword" th:field="*{newPassword}"
                type="password" minlength="8" maxlength="128" autocomplete="new-password" required>
            <small class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></small>
            <label for="confirmPassword">确认新密码</label><input id="confirmPassword" th:field="*{confirmPassword}"
                type="password" minlength="8" maxlength="128" autocomplete="new-password" required>
            <small class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
            <button type="submit">保存并重新登录</button>
        </form>
        <ul class="password-policy"><li>长度为 8–128 个字符</li><li>必须同时包含大写字母、小写字母、数字和特殊字符</li>
            <li>不能使用常见密码、用户名或当前密码</li></ul>
    </section></main></body></html>
