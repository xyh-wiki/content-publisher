<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<aside id="app-sidebar" class="app-sidebar" th:fragment="sidebar(active)" aria-label="应用导航">
    <div class="sidebar-brand">
        <a th:href="@{/}" class="brand-lockup">
            <img th:src="@{/assets/logo.svg}" alt="Content Publisher">
            <span><strong>Publisher</strong><small>内容分发中心</small></span>
        </a>
        <button class="sidebar-close" type="button" data-sidebar-close aria-controls="app-sidebar" aria-label="关闭导航">×</button>
    </div>

    <nav class="sidebar-nav" aria-label="主导航">
        <h2 class="sidebar-section-title">工作空间</h2>
        <a th:href="@{/}" th:classappend="${active == 'dashboard'} ? ' active'"
           th:attr="aria-current=${active == 'dashboard' ? 'page' : null}">
            <span class="nav-icon" aria-hidden="true">⌂</span><span>总览</span>
        </a>

        <h2 class="sidebar-section-title">内容生产</h2>
        <div class="sidebar-nav-group" data-sidebar-group="content"
             th:classappend="${active == 'projects'} ? ' expanded'"
             th:attr="data-sidebar-active=${active == 'projects'}">
            <div class="sidebar-nav-row"><a th:href="@{/projects}" th:classappend="${active == 'projects'} ? ' section-active'">
                <span class="nav-icon" aria-hidden="true">◇</span><span>内容工作台</span></a>
                <button class="sidebar-nav-toggle" type="button" data-sidebar-toggle aria-controls="sidebar-content-subnav" th:attr="aria-expanded=${active == 'projects'}" aria-label="展开或收起内容工作台子菜单"><span aria-hidden="true">⌄</span></button></div>
            <div id="sidebar-content-subnav" class="sidebar-subnav" role="group" aria-label="内容工作台子菜单">
                <a th:href="@{/projects(source='website')}" th:classappend="${active == 'projects' and activeSourcePanel == 'website'} ? ' active'"
                   th:attr="aria-current=${active == 'projects' and activeSourcePanel == 'website' ? 'page' : null}">网站推荐</a>
                <a th:href="@{/projects(source='git')}" th:classappend="${active == 'projects' and activeSourcePanel == 'git'} ? ' active'"
                   th:attr="aria-current=${active == 'projects' and activeSourcePanel == 'git' ? 'page' : null}">Git 项目</a>
                <a th:href="@{/projects(source='topic')}" th:classappend="${active == 'projects' and activeSourcePanel == 'topic'} ? ' active'"
                   th:attr="aria-current=${active == 'projects' and activeSourcePanel == 'topic' ? 'page' : null}">主题教程</a>
            </div>
        </div>
        <a th:href="@{/content}" th:classappend="${active == 'content'} ? ' active'"
           th:attr="aria-current=${active == 'content' ? 'page' : null}">
            <span class="nav-icon" aria-hidden="true">▤</span><span>内容库</span>
        </a>

        <h2 class="sidebar-section-title">发布管理</h2>
        <div class="sidebar-nav-group" data-sidebar-group="publishing"
             th:classappend="${active == 'publishing' or active == 'article-publishing' or active == 'channels'} ? ' expanded'"
             th:attr="data-sidebar-active=${active == 'publishing' or active == 'article-publishing' or active == 'channels'}">
            <div class="sidebar-nav-row"><a th:href="@{/publishing}" th:classappend="${active == 'publishing' or active == 'article-publishing' or active == 'channels'} ? ' section-active'">
                <span class="nav-icon" aria-hidden="true">↗</span><span>发布中心</span></a>
                <button class="sidebar-nav-toggle" type="button" data-sidebar-toggle aria-controls="sidebar-publishing-subnav" th:attr="aria-expanded=${active == 'publishing' or active == 'article-publishing' or active == 'channels'}" aria-label="展开或收起发布管理子菜单"><span aria-hidden="true">⌄</span></button></div>
            <div id="sidebar-publishing-subnav" class="sidebar-subnav" role="group" aria-label="发布管理子菜单">
                <a th:href="@{/publishing(tab='queue')}" th:classappend="${active == 'publishing' and selectedTab == 'queue'} ? ' active'"
                   th:attr="aria-current=${active == 'publishing' and selectedTab == 'queue' ? 'page' : null}">待发布</a>
                <a th:href="@{/publishing(tab='batches')}" th:classappend="${active == 'publishing' and selectedTab == 'batches'} ? ' active'"
                   th:attr="aria-current=${active == 'publishing' and selectedTab == 'batches' ? 'page' : null}">执行批次</a>
                <a th:href="@{/publishing(tab='records')}" th:classappend="${active == 'publishing' and selectedTab == 'records'} ? ' active'"
                   th:attr="aria-current=${active == 'publishing' and selectedTab == 'records' ? 'page' : null}">发布记录</a>
                <a th:href="@{/channels}" th:classappend="${active == 'channels'} ? ' active'"
                   th:attr="aria-current=${active == 'channels' ? 'page' : null}">渠道管理</a>
            </div>
        </div>

        <h2 class="sidebar-section-title">运行维护</h2>
        <div class="sidebar-nav-group" data-sidebar-group="operations"
             th:classappend="${active == 'monitoring' or active == 'jobs'} ? ' expanded'"
             th:attr="data-sidebar-active=${active == 'monitoring' or active == 'jobs'}">
            <div class="sidebar-nav-row"><a th:href="@{/monitoring}" th:classappend="${active == 'monitoring' or active == 'jobs'} ? ' section-active'">
                <span class="nav-icon" aria-hidden="true">▦</span><span>运行中心</span></a>
                <button class="sidebar-nav-toggle" type="button" data-sidebar-toggle aria-controls="sidebar-operations-subnav" th:attr="aria-expanded=${active == 'monitoring' or active == 'jobs'}" aria-label="展开或收起运行维护子菜单"><span aria-hidden="true">⌄</span></button></div>
            <div id="sidebar-operations-subnav" class="sidebar-subnav" role="group" aria-label="运行维护子菜单">
                <a th:href="@{/monitoring}" th:classappend="${active == 'monitoring'} ? ' active'"
                   th:attr="aria-current=${active == 'monitoring' ? 'page' : null}">监控大屏</a>
                <a th:href="@{/jobs}" th:classappend="${active == 'jobs'} ? ' active'"
                   th:attr="aria-current=${active == 'jobs' ? 'page' : null}">任务队列</a>
            </div>
        </div>
        <a th:if="${canAdmin}" th:href="@{/recycle-bin}" th:classappend="${active == 'recycle'} ? ' active'"
           th:attr="aria-current=${active == 'recycle' ? 'page' : null}">
            <span class="nav-icon" aria-hidden="true">♲</span><span>回收站</span>
        </a>

        <h2 class="sidebar-section-title" th:if="${canAdmin}">系统设置</h2>
        <a th:if="${canAdmin}" th:href="@{/settings/ai}" th:classappend="${active == 'ai'} ? ' active'"
           th:attr="aria-current=${active == 'ai' ? 'page' : null}">
            <span class="nav-icon" aria-hidden="true">✦</span><span>AI 服务</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="account-card">
            <span class="account-avatar" th:text="${#strings.isEmpty(currentUsername) ? 'U' : #strings.substring(currentUsername,0,1).toUpperCase()}">A</span>
            <span class="account-copy"><strong th:text="${currentUsername}">admin</strong><small th:text="${currentTenant}">local</small></span>
        </div>
        <form th:action="@{/logout}" method="post"><button class="logout-button" type="submit">退出</button></form>
    </div>
</aside>

<header class="app-topbar" th:fragment="topbar(title, subtitle)">
    <button class="menu-button" type="button" data-sidebar-open aria-controls="app-sidebar" aria-expanded="false" aria-label="打开导航">☰</button>
    <div><h1 th:text="${title}">页面标题</h1><p th:text="${subtitle}">页面说明</p></div>
    <div class="topbar-actions"><span class="environment-dot"></span><span>服务运行中</span></div>
</header>
</body>
</html>
