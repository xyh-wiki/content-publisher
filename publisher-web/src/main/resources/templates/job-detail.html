<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex,nofollow">
    <title>任务详情 · Content Publisher</title><link rel="icon" type="image/svg+xml" th:href="@{/assets/logo.svg}">
    <link rel="stylesheet" th:href="@{/assets/app.css}"><script defer th:src="@{/assets/app.js}"></script></head>
<body class="app-page"><div class="app-layout"><aside th:replace="~{fragments/app-shell :: sidebar('jobs')}"></aside><div class="app-main">
    <header th:replace="~{fragments/app-shell :: topbar('后台任务', '查看导入、生成或发布任务的实时状态')}"></header><main class="page-content narrow">
        <section class="page-header"><div><p class="section-kicker">后台任务</p><h2>任务执行详情</h2><p th:text="|${jobDisplayName} · ${jobStatusLabel}|">任务状态</p></div><div class="header-actions"><a class="secondary-link" th:href="@{/jobs}">返回任务队列</a>
            <form th:if="${canAdmin and !active}" class="inline-action-form" th:action="@{/jobs/{id}/delete(id=${job.id})}" method="post" data-confirm="确认将这条终态任务移入回收站？若它生成了文章，文章及关联记录也会一并移入。"><button class="danger-link" type="submit">移入回收站</button></form></div></section>
        <section class="card job-hero" data-job-live th:attr="data-job-active=${active},data-job-status-url=@{/api/v1/jobs/{id}(id=${job.id})}"><div><span class="status-pill" data-job-status th:classappend="| status-${job.status.name().toLowerCase()}|" th:text="${jobStatusLabel}">等待执行</span><h2 th:text="${jobDisplayName}">生成主题教程</h2>
            <p data-job-summary th:text="${active} ? '任务正在后台执行，进度将自动更新。' : '任务已经结束，结果和异常信息已持久化。'">任务状态</p></div><div class="progress-number"><strong data-job-attempt th:text="|${job.attempt}/${job.maxAttempts}|">0/4</strong><span>执行次数</span></div></section>
        <section class="card job-progress-card section-gap"><div class="job-progress-heading"><div><p class="section-kicker">执行进度</p><h3>任务进度</h3><strong data-job-progress-label th:text="${progress.label}">等待执行</strong><p data-job-progress-detail th:text="${progress.detail}">任务已进入队列</p></div><span data-job-progress-percent th:text="|${progress.percent}%|">8%</span></div>
            <div class="job-progress-track" role="progressbar" aria-label="任务进度" aria-valuemin="0" aria-valuemax="100" th:attr="aria-valuenow=${progress.percent}"><span data-job-progress-bar th:style="|width:${progress.percent}%|"></span></div>
            <div class="job-progress-steps"><span data-stage-threshold="8" th:classappend="${progress.percent >= 8} ? ' done'">任务入队</span><span data-stage-threshold="40" th:classappend="${progress.percent >= 40} ? ' done'">读取与处理</span><span data-stage-threshold="65" th:classappend="${progress.percent >= 65} ? ' done'">生成或发布</span><span data-stage-threshold="100" th:classappend="${progress.percent >= 100} ? ' done'">结果落库</span></div>
            <small class="job-live-note" data-job-live-note th:text="${active} ? '每 2 秒同步一次任务状态' : '任务状态已确定'">同步状态</small></section>
        <section class="card detail-grid"><div><span>入队时间</span><strong th:text="${jobCreatedAt}">2026-07-21 06:56:24 UTC</strong></div><div><span>最后活动</span><strong th:text="${jobUpdatedAt}">2026-07-21 06:56:24 UTC</strong></div></section>
        <div class="alert error section-gap" th:if="${job.errorMessage}"><strong th:text="${job.errorCode}">ERROR</strong><br><span th:text="${job.errorMessage}">message</span></div>
        <section class="card section-gap" th:if="${canEdit and job.type.name() == 'PUBLISH_ARTICLE' and job.status.name() == 'FAILED'}"><div class="card-header"><div><p class="section-kicker">失败重试</p><h3>重新提交失败平台</h3><p>将沿用原文章、渠道账号和 canonical URL 创建新任务，已成功的平台不会重复执行。</p></div><form th:action="@{/jobs/{id}/publication-retry(id=${job.id})}" method="post"><input type="hidden" name="idempotencyKey" th:value="|publication-retry:${job.id}|"><button class="primary-button" type="submit">重新发布</button></form></div></section>
        <section class="card section-gap" th:if="${resultLink}"><div class="card-header"><div><p class="section-kicker">下一步</p><h3>任务执行成功</h3><p>结果资源已经创建，继续进入下一阶段。</p></div><a class="primary-link" th:href="${resultLink}">查看结果 →</a></div></section>
    </main></div></div></body></html>
